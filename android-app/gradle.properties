# Project-wide Gradle settings.

# Enables AndroidX (required by appcompat, core-ktx, material, etc.)
android.useAndroidX=true

# No legacy support libraries are used, so Jetifier can stay off.
android.enableJetifier=false

# Silence the AGP 8.1 warning about compileSdk = 34 being newer than the AGP test matrix.
android.suppressUnsupportedCompileSdk=34

# JVM args for the Gradle daemon.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Kotlin code style.
kotlin.code.style=official

# Build only the resources used by the current variant (faster builds).
android.nonTransitiveRClass=true
