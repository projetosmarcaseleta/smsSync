name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy via SCP and SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/var/www/smsSync"
          rm: true # Opcional: remove arquivos antigos antes de copiar
          
      - name: Install dependencies and Restart Applications via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            
            # Garante que o PM2 está instalado globalmente
            if ! command -v pm2 &> /dev/null; then
              echo "Instalando PM2..."
              npm install -g pm2
            fi

            # --- Configuração do smsSync ---
            echo "Configurando smsSync..."
            cd /var/www/smsSync/smsSync

            # Instala dependências de produção
            echo "Instalando dependências do smsSync..."
            npm install --omit=dev

            # Garante que o .env existe
            if [ ! -f ".env" ]; then
              echo "AVISO: arquivo .env não encontrado em /var/www/smsSync/smsSync/.env"
              echo "Crie o arquivo manualmente na VPS antes de iniciar."
              exit 1
            fi

            # Inicia ou reinicia com PM2
            echo "Reiniciando smsSync com PM2..."
            if pm2 list | grep -q "smsSync"; then
              pm2 restart smsSync
            else
              pm2 start server.js --name smsSync
            fi

            # --- Configuração do velloTalk ---
            echo "Configurando velloTalk..."
            cd /var/www/smsSync/velloTalk

            # Instala dependências de produção
            echo "Instalando dependências do velloTalk..."
            npm install --omit=dev

            # Garante que o .env existe
            if [ ! -f ".env" ]; then
              echo "AVISO: arquivo .env não encontrado em /var/www/smsSync/velloTalk/.env"
              echo "Crie o arquivo manualmente na VPS antes de iniciar."
              exit 1
            fi

            # Inicia ou reinicia com PM2
            echo "Reiniciando velloTalk com PM2..."
            if pm2 list | grep -q "velloTalk"; then
              pm2 restart velloTalk
            else
              pm2 start sms-ws-bridge.mjs --name velloTalk --node-args="--env-file=.env"
            fi

            pm2 save
            echo "Deploy de ambas as aplicações concluído com sucesso!"
